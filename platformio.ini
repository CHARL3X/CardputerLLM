[platformio]
default_envs = cardputer

[env:cardputer]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200
monitor_filters = esp32_exception_decoder
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600

board_build.mcu = esp32s3
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
board_upload.maximum_size = 8388608

build_flags =
    -DESP32S3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DCORE_DEBUG_LEVEL=3
    ; Note: bumping the loopTask stack via -DCONFIG_ARDUINO_LOOP_STACK_SIZE
    ; here does NOT work -- the arduino-esp32 framework is precompiled, so
    ; the macro only affects user code, not the cores/esp32/main.cpp that
    ; spawns loopTask. We override the framework's weak
    ; getArduinoLoopTaskStackSize() symbol in src/main.cpp instead.

extra_scripts = post:support/copy_dist.py

lib_deps =
    m5stack/M5Cardputer
    enkei0x/ESPAI@^0.9.0
